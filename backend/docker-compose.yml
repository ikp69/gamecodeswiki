version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codergg_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: codergg
      POSTGRES_USER: codergg
      POSTGRES_PASSWORD: codergg123
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codergg_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
